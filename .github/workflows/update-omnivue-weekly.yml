name: Update OmniVue Weekly Signal
on:
  repository_dispatch:
    types: [omnivue-weekly-update]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Write omnivue-weekly.json
        env:
          CONTENT: ${{ github.event.client_payload.content }}
        run: |
          echo "$CONTENT" > data/omnivue-weekly.json
          cat data/omnivue-weekly.json
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/omnivue-weekly.json
          git diff --staged --quiet || git commit -m "auto: OmniVue weekly signal update"
          git push
